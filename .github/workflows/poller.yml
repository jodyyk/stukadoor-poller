name: Stukadoor lead-poller

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Aantal dagen terugkijken (voor handmatig backfillen, bv. 30)"
        required: false
        default: "30"

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: node poller.mjs
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          LEAD_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || secrets.LEAD_LOOKBACK_DAYS }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_INVOICE_URL: ${{ secrets.INGEST_INVOICE_URL }}
